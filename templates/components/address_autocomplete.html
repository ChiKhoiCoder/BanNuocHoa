<!-- Address Autocomplete Input (Feature 13) -->
<div class="form-group">
    <label for="address-input">Địa chỉ giao hàng</label>
    <input 
        type="text" 
        id="address-input"
        class="form-control" 
        name="address"
        data-autocomplete="address"
        placeholder="Nhập địa chỉ..."
        required
    >
    <small class="text-muted">Gợi ý sẽ hiện khi bạn nhập</small>
</div>
