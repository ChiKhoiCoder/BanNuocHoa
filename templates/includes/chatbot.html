<style>
    /* Premium Sidebar Chatbot Styles - Redesigned as Universal Sidebar */
    #chatbot-widget {
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 9999;
    }

    .chatbot-toggle-btn {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, #d4a574, #b5804e);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        transition: all 0.3s ease;
    }

    .chatbot-toggle-btn:hover {
        transform: scale(1.1) rotate(15deg);
    }

    .chatbot-sidebar {
        position: fixed;
        top: 0;
        right: -550px;
        width: 550px;
        height: 100vh;
        background: white;
        box-shadow: -10px 0 50px rgba(0, 0, 0, 0.15);
        z-index: 10000;
        display: flex;
        flex-direction: column;
        transition: right 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        border-left: 1px solid #e2e8f0;
    }

    .chatbot-sidebar.active {
        right: 0;
    }

    .sidebar-header {
        background: #0f172a;
        color: white;
        padding: 25px 30px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 3px solid #d4a574;
    }

    .sidebar-header h4 {
        margin: 0;
        font-size: 20px;
        font-weight: 800;
        letter-spacing: 1.5px;
        text-transform: uppercase;
    }

    .sidebar-close {
        background: rgba(255,255,255,0.1);
        border: none;
        color: white;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        font-size: 24px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.3s;
    }

    .sidebar-close:hover {
        background: rgba(255,255,255,0.2);
    }

    .chat-messages {
        flex: 1;
        padding: 30px;
        overflow-y: auto;
        background: #fdfcfb;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .message {
        max-width: 90%;
        padding: 20px;
        border-radius: 20px;
        font-size: 15px;
        line-height: 1.6;
        animation: slideIn 0.4s ease forwards;
        box-shadow: 0 4px 15px rgba(0,0,0,0.03);
    }

    @keyframes slideIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .message.bot {
        background: white;
        color: #1e293b;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
        border: 1px solid #f1f5f9;
    }

    .message.user {
        background: linear-gradient(135deg, #d4a574, #b5804e);
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
    }

    /* Structured content style */
    .quick-view-content {
        border: 1px solid #e2e8f0;
        border-radius: 15px;
        padding: 20px;
        margin-bottom: 15px;
        background: #fff;
    }

    .quick-view-content h3 {
        color: #d4a574;
        font-size: 22px;
        font-weight: 800;
        margin-bottom: 10px;
    }

    .quick-view-price {
        font-size: 20px;
        font-weight: 700;
        color: #ef4444;
        margin-bottom: 15px;
    }

    .sidebar-footer {
        padding: 25px 30px;
        background: white;
        border-top: 1px solid #f1f5f9;
        box-shadow: 0 -10px 25px rgba(0,0,0,0.02);
    }

    .chat-input-group {
        display: flex;
        gap: 12px;
        background: #f8fafc;
        padding: 8px;
        border-radius: 35px;
        border: 1px solid #e2e8f0;
    }

    .chat-input-group input {
        flex: 1;
        border: none;
        background: transparent;
        padding: 10px 20px;
        outline: none;
        font-size: 15px;
        color: #1e293b;
    }

    .chat-send-btn {
        background: #d4a574;
        color: white;
        border: none;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s;
        box-shadow: 0 4px 10px rgba(212, 165, 116, 0.4);
    }

    .chat-send-btn:hover {
        transform: scale(1.1);
        background: #b5804e;
    }
</style>

<div class="chatbot-sidebar" id="chatbot-sidebar">
    <div class="sidebar-header">
        <h4 id="sidebar-title"><i class="bi bi-stars me-2 text-warning"></i> NỘI DUNG CHI TIẾT</h4>
        <button class="sidebar-close" onclick="toggleChatbotSidebar()">&times;</button>
    </div>

    <div class="chat-messages" id="chat-messages">
        <div id="loader" style="display:none; text-align:center; padding:20px;">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Đang tải nội dung...</p>
        </div>
    </div>

    <div class="sidebar-footer">
        <div class="chat-input-group">
            <input type="text" id="chat-input" placeholder="Hỏi về nội dung này..." onkeypress="handleChatKeyPress(event)">
            <button class="chat-send-btn" onclick="sendChatMessage()">
                <i class="bi bi-send-fill"></i>
            </button>
        </div>
    </div>
</div>

<script>
    function toggleChatbotSidebar(force = null) {
        const sidebar = document.getElementById('chatbot-sidebar');
        if (sidebar) {
            if (force === true) sidebar.classList.add('active');
            else if (force === false) sidebar.classList.remove('active');
            else sidebar.classList.toggle('active');
            
            if (sidebar.classList.contains('active')) {
                document.getElementById('chat-input').focus();
            }
        }
    }

    function appendChatMessage(text, sender, isHtml = false) {
        const container = document.getElementById('chat-messages');
        const msg = document.createElement('div');
        msg.className = `message ${sender}`;
        if (isHtml) msg.innerHTML = text;
        else msg.innerText = text;
        container.appendChild(msg);
        container.scrollTop = container.scrollHeight;
    }

    function sendChatMessage(overrideQuery = null) {
        const input = document.getElementById('chat-input');
        const query = overrideQuery || input.value.trim();
        if (!query) return;

        if (!overrideQuery) input.value = '';
        appendChatMessage(query, 'user');

        const currentUrl = window.location.href;
        
        fetch(`http://127.0.0.1:9001/chat?q=${encodeURIComponent(query)}&url=${encodeURIComponent(currentUrl)}`)
            .then(res => res.json())
            .then(data => {
                appendChatMessage(data.answer, 'bot');
            })
            .catch(err => {
                console.error(err);
                appendChatMessage("Xin lỗi, tôi không thể kết nối tới máy chủ AI lúc này.", 'bot');
            });
    }

    function handleChatKeyPress(event) {
        if (event.key === 'Enter') sendChatMessage();
    }

    function showQuickView(url) {
        toggleChatbotSidebar(true);
        const container = document.getElementById('chat-messages');
        const loader = document.getElementById('loader');
        
        loader.style.display = 'block';
        container.appendChild(loader);
        
        fetch(`http://127.0.0.1:9001/summary?url=${encodeURIComponent(url)}`)
            .then(res => res.json())
            .then(data => {
                loader.style.display = 'none';
                if (data.error) {
                    appendChatMessage("Không thể tải được nội dung trang này.", "bot");
                } else {
                    const html = `
                        <div class="quick-view-content">
                            <h3>${data.name}</h3>
                            <div class="quick-view-price">${data.price}</div>
                            <p>${data.description}</p>
                            <a href="${data.url}" class="btn btn-sm btn-outline-primary mt-2">Xem trang gốc</a>
                            <button class="btn btn-sm btn-primary mt-2 ms-2" onclick="sendChatMessage('Tóm tắt thêm về ${data.name}')">Hỏi AI thêm</button>
                        </div>
                    `;
                    appendChatMessage(html, "bot", true);
                }
            })
            .catch(err => {
                loader.style.display = 'none';
                appendChatMessage("Lỗi kết nối máy chủ.", "bot");
            });
    }

    // Global Interceptor
    document.addEventListener('click', function(e) {
        const target = e.target.closest('.product-name-link, .btn-view-detail, .product-img-wrap');
        if (target && target.href) {
            e.preventDefault();
            showQuickView(target.href);
        }
    });
</script>
