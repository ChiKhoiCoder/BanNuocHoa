{% extends 'base.html' %}

{% block title %}Đổi mật khẩu{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-body p-5">
                    <h2 class="card-title text-center mb-4" style="color: #d4a574;">Đổi mật khẩu</h2>
                    
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="old_password" class="form-label">Mật khẩu cũ</label>
                            <input type="password" class="form-control" name="old_password" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="new_password1" class="form-label">Mật khẩu mới</label>
                            <input type="password" class="form-control" name="new_password1" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="new_password2" class="form-label">Xác nhận mật khẩu mới</label>
                            <input type="password" class="form-control" name="new_password2" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 py-2">Đổi mật khẩu</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
