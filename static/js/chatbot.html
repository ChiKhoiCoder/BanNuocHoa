<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>AI Chatbot</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }

        .chatbox {
            width: 400px;
            height: 500px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            margin: 50px auto;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #4CAF50;
            color: white;
            padding: 15px;
            font-size: 18px;
            text-align: center;
        }

        .messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        .user {
            text-align: right;
            margin: 5px;
        }

        .bot {
            text-align: left;
            margin: 5px;
        }

        .input-box {
            display: flex;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            outline: none;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="chatbox">

        <div class="header">
            AI Chatbot
        </div>

        <div class="messages" id="messages"></div>

        <div class="input-box">

            <input id="q" placeholder="Nhập câu hỏi...">

            <button onclick="ask()">Gửi</button>

        </div>

    </div>

    <script>

        function addMessage(text, type) {

            let div = document.createElement("div")

            div.className = type

            div.innerText = text

            document.getElementById("messages").appendChild(div)

        }

        function ask() {

            let q = document.getElementById("q").value

            addMessage(q, "user")

            fetch("http://127.0.0.1:9000/chat?q=" + q)
                .then(r => r.json())
                .then(data => {
                    addMessage(data.answer, "bot")
                })

            document.getElementById("q").value = ""

        }

    </script>

</body>

</html>
